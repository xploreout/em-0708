[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "em-0708-production.up.railway.app"
  status = 200
  force = true

# SPA fallback — all non-asset routes serve index.html (needed for HashRouter)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
